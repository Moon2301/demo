<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Giỏ hàng</title>

    <style>
        .cart-wrapper {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .cart-table thead {
            background: #f8f9fa;
        }

        .cart-table th {
            font-weight: 600;
            text-align: center;
            border: none !important;
            padding: 16px;
        }

        .cart-table td {
            vertical-align: top;
            border-top: 1px solid #f0f0f0 !important;
            padding: 18px 12px;
        }

        .cart-table tbody tr:hover {
            background: #fafafa;
            transition: 0.2s;
        }

        .cart-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .price {
            color: #e30019;
            font-weight: 600;
        }

        .total-box {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .points-box {
            background: #fff8e1;
            border-radius: 12px;
            border: 1px solid #ffe082;
        }

        .btn-custom-primary {
            background: #007bff;
            border: none;
            border-radius: 10px;
            padding: 8px 20px;
        }
    </style>
</head>

<body>
<section layout:fragment="content" class="container mt-5">

    <h3 class="fw-bold mb-4">🛒 Giỏ hàng của bạn</h3>

    <!-- Nếu trống -->
    <div th:if="${cartItems == null or #lists.isEmpty(cartItems)}"
         class="alert alert-warning text-center rounded-4 shadow-sm">
        Giỏ hàng của bạn đang trống
    </div>

    <!-- Nếu có sản phẩm -->
    <div th:if="${cartItems != null and !#lists.isEmpty(cartItems)}">

        <div class="cart-wrapper">
            <div class="table-responsive">
                <table class="table cart-table mb-0">

                    <thead>
                    <tr>
                        <th style="width:120px">Hình ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th style="width:120px">Số lượng</th>
                        <th style="width:180px">Đơn giá</th>
                        <th style="width:180px">Thành tiền</th>
                        <th style="width:100px">Xóa</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="item : ${cartItems}">

                        <td class="text-center">
                            <img th:src="@{'/images/products/' + ${item.product.image}}"
                                 class="cart-img"
                                 onerror="this.src='https://via.placeholder.com/80'">
                        </td>

                        <td class="pt-3">
                            <span class="fw-semibold fs-5"
                                  th:text="${item.product.name}">
                            </span>
                        </td>

                        <td class="text-center pt-3"
                            th:text="${item.quantity}">
                        </td>

                        <td class="text-end price pt-3"
                            th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                        </td>

                        <td class="text-end price fw-bold pt-3"
                            th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                        </td>

                        <td class="text-center pt-3">
                            <a th:href="@{/cart/remove/{id}(id=${item.product.id})}"
                               class="btn btn-sm btn-outline-danger">
                                Xóa
                            </a>
                        </td>

                    </tr>
                    </tbody>

                </table>
            </div>
        </div>

        <!-- Tổng tiền -->
        <div class="total-box p-4 mt-4">

            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Tổng tiền:</h5>

                <h4 class="price mb-0"
                    th:text="${#numbers.formatDecimal(
                #aggregates.sum(cartItems.![product.price * quantity]),
                0, 'COMMA', 0, 'POINT'
            )} + ' ₫'">
                </h4>
            </div>

            <!-- Điểm hiện có -->
            <div class="points-box p-3 mt-3">

                <div class="d-flex justify-content-between">
                    <span>🎁 Điểm tích lũy của bạn:</span>
                    <strong th:text="${points} + ' điểm'"></strong>
                </div>

                <!-- Điểm sẽ nhận -->
                <div class="d-flex justify-content-between mt-2">
                    <span>Bạn sẽ nhận thêm:</span>
                    <strong th:text="${#aggregates.sum(cartItems.![product.price * quantity]) / 10000} + ' điểm'">
                    </strong>
                </div>

                <small class="text-muted">
                    Quy đổi: 10.000đ = 1 điểm
                </small>

            </div>

        </div>

        <!-- Buttons -->
        <div class="mt-4">
            <a th:href="@{/cart/clear}"
               class="btn btn-secondary rounded-3 px-4">
                Xóa tất cả
            </a>

            <a th:href="@{/order/checkout}"
               class="btn btn-custom-primary text-white ms-2">
                Thanh toán
            </a>
        </div>

    </div>

</section>
</body>
</html>
