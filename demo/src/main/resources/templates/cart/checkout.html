<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Thanh toán đơn hàng</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body { background:#f5f6f8; }

        .card-custom {
            border-radius:16px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
            border:none;
        }

        .price { color:#e30019; font-weight:600; }

        .total-price {
            font-size:24px;
            font-weight:700;
            color:#e30019;
        }

        .free-ship { color:green; }

        .secure-box {
            background:#e9f7ef;
            padding:8px;
            border-radius:8px;
            font-size:14px;
            color:#2e7d32;
        }

        .point-box {
            background:#fff8e1;
            border:1px solid #ffe082;
            padding:12px;
            border-radius:12px;
            margin-top:15px;
        }
    </style>
</head>

<body>
<section layout:fragment="content" class="container mt-4">

    <h3 class="fw-bold">🧾 Thanh toán đơn hàng</h3>
    <hr>

    <div class="row">

        <!-- LEFT -->
        <div class="col-md-7">
            <div class="card card-custom p-4">

                <h5 class="fw-bold mb-3">👤 THÔNG TIN NGƯỜI NHẬN</h5>

                <form th:action="@{/order/submit}" method="post">

                    <div class="mb-3">
                        <label>Họ và tên *</label>
                        <input type="text" name="customerName"
                               class="form-control" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Số điện thoại *</label>
                            <input type="text" name="phone"
                                   class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Email</label>
                            <input type="email" name="email"
                                   class="form-control">
                        </div>
                    </div>

                    <!-- CHỌN KHU VỰC -->
                    <div class="mb-3">
                        <label>Khu vực giao hàng *</label>
                        <select id="areaSelect" name="area" class="form-select" required>
                            <option value="inner">Nội thành (Miễn phí)</option>
                            <option value="outer">Ngoại thành (+100.000 ₫)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Địa chỉ giao hàng *</label>
                        <input type="text" name="address"
                               class="form-control" required>
                    </div>

                    <button type="submit"
                            class="btn btn-primary px-4 rounded-3">
                        Xác nhận đặt hàng
                    </button>

                </form>

            </div>
        </div>

        <!-- RIGHT -->
        <div class="col-md-5">
            <div class="card card-custom p-4">

                <h5 class="fw-bold mb-3">🛒 ĐƠN HÀNG CỦA BẠN</h5>

                <div th:with="
                        subtotal=${cartItems != null ? #aggregates.sum(cartItems.![product.price * quantity]) : 0}
                    ">

                    <!-- DANH SÁCH -->
                    <div th:each="item : ${cartItems}"
                         class="d-flex justify-content-between align-items-center mb-3">

                        <div>
                            <div class="fw-semibold"
                                 th:text="${item.product.name}"></div>
                            <small>Số lượng:
                                <span th:text="${item.quantity}"></span>
                            </small>
                        </div>

                        <div class="price fw-bold"
                             th:text="${#numbers.formatDecimal(item.product.price * item.quantity,0,'COMMA',0,'POINT')} + ' ₫'">
                        </div>

                    </div>

                    <hr>

                    <!-- TẠM TÍNH -->
                    <div class="d-flex justify-content-between">
                        <span>Tạm tính</span>
                        <span id="subtotalText"
                              th:data-subtotal="${subtotal}"
                              th:text="${#numbers.formatDecimal(subtotal,0,'COMMA',0,'POINT')} + ' ₫'">
                        </span>
                    </div>

                    <div class="d-flex justify-content-between">
                        <span>Phí vận chuyển</span>
                        <span id="shippingText" class="free-ship">0 ₫</span>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold fs-5">Tổng cộng</span>
                        <span id="totalText" class="total-price"></span>
                    </div>

                    <!-- ĐIỂM -->
                    <div class="point-box">
                        <div class="d-flex justify-content-between">
                            <span>🎁 Điểm hiện có:</span>
                            <strong th:text="${points} + ' điểm'"></strong>
                        </div>

                        <div class="d-flex justify-content-between mt-2">
                            <span>Bạn sẽ nhận thêm:</span>
                            <strong id="earnedPoints"></strong>
                        </div>

                        <small>Quy đổi: 10.000 ₫ = 1 điểm</small>
                    </div>

                </div>

                <div class="secure-box text-center mt-3">
                    🔒 Thông tin được bảo mật an toàn
                </div>

            </div>
        </div>

    </div>

    <!-- JAVASCRIPT REALTIME -->
    <script>
        const areaSelect = document.getElementById("areaSelect");
        const subtotalElement = document.getElementById("subtotalText");
        const shippingText = document.getElementById("shippingText");
        const totalText = document.getElementById("totalText");
        const earnedPointsText = document.getElementById("earnedPoints");

        const subtotal = parseFloat(subtotalElement.dataset.subtotal);

        function formatVND(number) {
            return number.toLocaleString('vi-VN') + " ₫";
        }

        function updateTotal() {
            let shipping = 0;

            if (areaSelect.value === "outer") {
                shipping = 100000;
            }

            const total = subtotal + shipping;
            const points = Math.floor(total / 10000);

            shippingText.innerText = formatVND(shipping);
            totalText.innerText = formatVND(total);
            earnedPointsText.innerText = points + " điểm";
        }

        areaSelect.addEventListener("change", updateTotal);

        // chạy lần đầu khi load trang
        updateTotal();
    </script>
</section>



</body>
</html>
