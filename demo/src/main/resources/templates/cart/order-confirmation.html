<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Xác nhận đơn hàng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f5f6f8; }
        .confirm-box {
            background: #ffffff; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 40px; text-align: center;
        }
        .success-icon { font-size: 70px; color: #28a745; }
        .order-summary {
            background: #f8f9fa; border-radius: 12px;
            padding: 20px; margin-top: 25px; text-align: left;
        }
        .points-box {
            background: #fff8e1; border: 1px solid #ffe082;
            border-radius: 12px; padding: 15px; margin-top: 20px;
        }
        .btn-custom { border-radius: 10px; padding: 10px 25px; }
    </style>
</head>
<body>
<section layout:fragment="content" class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="confirm-box">
                <div class="success-icon">✅</div>
                <h2 class="fw-bold mt-3 text-success">Đặt hàng thành công!</h2>
                <p class="text-muted">
                    Chào <span class="fw-bold text-dark" th:text="${customerName}">Khách hàng</span>,
                    cảm ơn bạn đã tin tưởng cửa hàng.
                </p>

                <div class="order-summary border">
                    <h5 class="fw-bold mb-3"><i class="bi bi-receipt"></i> Chi tiết thanh toán:</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Tiền hàng:</span>
                        <span th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Phí vận chuyển:</span>
                        <span th:if="${shippingFee > 0}" th:text="${#numbers.formatDecimal(shippingFee, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                        <span th:if="${shippingFee == 0}" class="text-success fw-bold">MIỄN PHÍ 🚚</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold">Tổng cộng:</span>
                        <span class="text-danger fw-bold fs-4"
                              th:text="${#numbers.formatDecimal(finalTotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                    </div>
                </div>

                <div class="points-box">
                    <div class="fw-semibold">🎁 Điểm tích lũy nhận được từ đơn này:</div>
                    <h4 class="text-danger mt-2">
                        + <span th:text="${points}">0</span> điểm
                    </h4>
                    <small class="text-muted">(100.000₫ tương ứng với 1 điểm thưởng)</small>
                </div>

                <div class="mt-4">
                    <a th:href="@{/}" class="btn btn-primary btn-custom me-2 shadow-sm">
                        <i class="bi bi-house-door"></i> Về trang chủ
                    </a>
                    <a th:href="@{/products}" class="btn btn-outline-secondary btn-custom shadow-sm">
                        Tiếp tục mua sắm
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
