<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Xác nhận đơn hàng</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f5f6f8;
        }

        .confirm-box {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 40px;
            text-align: center;
        }

        .success-icon {
            font-size: 70px;
            color: #28a745;
        }

        .points-box {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .btn-custom {
            border-radius: 10px;
            padding: 10px 25px;
        }
    </style>
</head>

<body>
<section layout:fragment="content" class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="confirm-box">

                <div class="success-icon">✅</div>

                <h2 class="fw-bold mt-3 text-success">
                    Cảm ơn bạn đã mua hàng!
                </h2>

                <p class="text-muted mt-2">
                    Đơn hàng của bạn đã được đặt thành công.
                    Chúng tôi sẽ liên hệ và giao hàng sớm nhất.
                </p>

                <!-- Điểm tích lũy -->
                <div class="points-box">

                    <div class="fw-semibold">
                        🎁 Điểm tích lũy hiện tại của bạn:
                    </div>

                    <h4 class="text-danger mt-2"
                        th:text="${points} + ' điểm'">
                    </h4>

                </div>

                <!-- Buttons -->
                <div class="mt-4">

                    <a th:href="@{/}"
                       class="btn btn-primary btn-custom me-2">
                        Về trang chủ
                    </a>

                    <a th:href="@{/cart}"
                       class="btn btn-outline-secondary btn-custom">
                        Xem giỏ hàng
                    </a>

                </div>

            </div>

        </div>
    </div>

</section>
</body>
</html>
