<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title th:text="${title} ?: 'Danh mục'">Danh mục</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
<section layout:fragment="content">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>📂 Danh sách danh mục</h4>

    <a th:href="@{/categories/add}" class="btn btn-primary">
      ➕ Thêm danh mục
    </a>
  </div>

  <!-- TABLE -->
  <table class="table table-bordered table-hover align-middle">
    <thead class="table-dark">
    <tr>
      <th style="width: 80px">ID</th>
      <th style="width: 100px">Icon</th>
      <th>Tên danh mục</th>
      <th style="width: 150px" class="text-center">Hành động</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="category : ${categories}">
      <!-- ID -->
      <td th:text="${category.id}"></td>

      <!-- ICON -->
      <td class="text-center">

        <img th:if="${category.iconPath != null and !#strings.isEmpty(category.iconPath)}"
             th:src="@{'/images/category/' + ${category.iconPath} + '?v=' + ${#dates.createNow().time}}"
             alt="icon"
             style="width:40px;height:40px;object-fit:contain"
             onerror="this.src='https://via.placeholder.com/40x40?text=X'">

        <span th:if="${category.iconPath == null or #strings.isEmpty(category.iconPath)}"
              class="text-muted">
      Không có
  </span>

      </td>

      <!-- NAME -->
      <td th:text="${category.name}"></td>

      <!-- ACTION -->
      <td class="text-center">
        <a th:href="@{/categories/update/{id}(id=${category.id})}"
           class="btn btn-warning btn-sm">
          ✏ Sửa
        </a>

        <a th:href="@{/categories/delete/{id}(id=${category.id})}"
           class="btn btn-danger btn-sm"
           onclick="return confirm('Bạn có chắc muốn xóa?')">
          🗑 Xóa
        </a>
      </td>

    </tr>
    </tbody>
  </table>

</section>
</body>
</html>
