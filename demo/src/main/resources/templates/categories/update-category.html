<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Update Category</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<section layout:fragment="content" class="container mt-5">

    <h1 class="mb-4">Update Category</h1>

    <form th:action="@{/categories/update/{id}(id=${category.id})}"
          th:object="${category}"
          method="post"
          enctype="multipart/form-data"
          class="needs-validation"
          novalidate>

        <!-- Category Name -->
        <div class="mb-3">
            <label class="form-label">Category Name:</label>
            <input type="text"
                   th:field="*{name}"
                   class="form-control"
                   required>

            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
                Valid name is required.
            </div>
        </div>

        <!-- Current Icon -->
        <div class="mb-3">
            <label class="form-label">Current Icon:</label><br>

            <img th:if="${category.iconPath != null}"
                 th:src="@{/images/category/{img}(img=${category.iconPath})}"
                 style="width:60px;height:60px;object-fit:contain">

            <span th:if="${category.iconPath == null}" class="text-muted">
                No icon
            </span>
        </div>

        <!-- Upload New Icon -->
        <div class="mb-3">
            <label class="form-label">Change Icon:</label>
            <input type="file"
                   name="iconFile"
                   class="form-control">
        </div>

        <!-- Buttons -->
        <button type="submit" class="btn btn-primary">
            Update
        </button>

        <a th:href="@{/categories}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
