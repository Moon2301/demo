<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Trang chủ</title>

    <style>

        .container-main {
            max-width: 1200px;
            margin: auto;
        }

        .sale-section {
            background: linear-gradient(90deg,#ff0000,#c40000);
            padding: 30px;
            border-radius: 20px;
            color: white;
            margin-bottom: 50px;
        }

        .flash-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            transition: 0.3s;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .product-img {
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .product-img img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        .price-new {
            color: #d0021c;
            font-weight: bold;
            font-size: 18px;
        }

        .price-old {
            text-decoration: line-through;
            color: gray;
            font-size: 14px;
        }

        .buy-btn {
            background: #ffcc00;
            border: none;
            width: 100%;
            font-weight: bold;
            border-radius: 10px;
        }

        .buy-btn:hover {
            background: orange;
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .sakura {
            position: fixed;
            top: -10px;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 9999;
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .countdown-bar {
            background: rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .countdown-bar span {
            background: #fff;
            color: #d0021c;
            padding: 4px 8px;
            border-radius: 6px;
            margin: 0 3px;
            min-width: 30px;
            display: inline-block;
            text-align: center;
        }

    </style>
</head>

<body>

<section layout:fragment="content">

    <div class="container-main">

        <!-- ================= SALE SECTION ================= -->
        <div class="sale-section">

            <div class="countdown-bar">
                ⏰ Kết thúc sau:
                <span id="hours">01</span> :
                <span id="minutes">00</span> :
                <span id="seconds">00</span>
            </div>

            <div class="flash-title">
                ⚡ SẢN PHẨM ĐANG SALE
            </div>

            <div class="row g-4">

                <div class="col-6 col-md-4 col-lg-3"
                     th:each="p : ${saleProducts}">

                    <div class="product-card">

                        <div class="product-img">
                            <img th:src="@{/images/products/{img}(img=${p.image})}"
                                 onerror="this.src='https://via.placeholder.com/200x200'">
                        </div>

                        <h6 class="fw-bold mt-2"
                            th:text="${p.name}">
                        </h6>

                        <div class="price-new"
                             th:text="${#numbers.formatDecimal(p.salePrice,0,'COMMA',0,'POINT')} + ' ₫'">
                        </div>

                        <div class="price-old"
                             th:text="${#numbers.formatDecimal(p.originalPrice,0,'COMMA',0,'POINT')} + ' ₫'">
                        </div>

                        <!-- ADD TO CART -->
                        <form th:action="@{/cart/add}" method="post" class="mt-2">
                            <input type="hidden" name="productId" th:value="${p.id}" />
                            <input type="hidden" name="quantity" value="1" />
                            <button type="submit" class="btn buy-btn">
                                🛒 Thêm vào giỏ hàng
                            </button>
                        </form>

                    </div>
                </div>

            </div>

        </div>


        <!-- ================= NORMAL PRODUCTS ================= -->
        <div>

            <div class="section-title">
                🛍 SẢN PHẨM KHÔNG SALE
            </div>

            <div class="row g-4">

                <div class="col-6 col-md-4 col-lg-3"
                     th:each="p : ${normalProducts}">

                    <div class="product-card">

                        <div class="product-img">
                            <img th:src="@{/images/products/{img}(img=${p.image})}"
                                 onerror="this.src='https://via.placeholder.com/200x200'">
                        </div>

                        <h6 class="fw-bold mt-2"
                            th:text="${p.name}">
                        </h6>

                        <div class="price-new text-dark"
                             th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + ' ₫'">
                        </div>

                        <!-- ADD TO CART -->
                        <form th:action="@{/cart/add}" method="post" class="mt-2">
                            <input type="hidden" name="productId" th:value="${p.id}" />
                            <input type="hidden" name="quantity" value="1" />
                            <button type="submit" class="btn buy-btn">
                                🛒 Thêm vào giỏ hàng
                            </button>
                        </form>

                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const h = document.getElementById("hours");
            const m = document.getElementById("minutes");
            const s = document.getElementById("seconds");

            if (!h || !m || !s) return;

            let time = 3600;

            setInterval(function () {
                let hours = Math.floor(time / 3600);
                let minutes = Math.floor((time % 3600) / 60);
                let seconds = time % 60;

                h.textContent = hours.toString().padStart(2, '0');
                m.textContent = minutes.toString().padStart(2, '0');
                s.textContent = seconds.toString().padStart(2, '0');

                if (time > 0) time--;

            }, 1000);
        });
    </script>

</section>

<script>
    function createSakura() {
        const sakura = document.createElement("div");
        sakura.classList.add("sakura");
        sakura.innerHTML = "🌸";   // emoji hoa anh đào

        sakura.style.left = Math.random() * window.innerWidth + "px";
        sakura.style.animationDuration = (Math.random() * 5 + 5) + "s";

        document.body.appendChild(sakura);

        setTimeout(() => {
            sakura.remove();
        }, 10000);
    }

    setInterval(createSakura, 300);
</script>


</body>
</html>
