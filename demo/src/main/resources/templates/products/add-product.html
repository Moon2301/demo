<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Add Product</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    .card-form {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 30px;
    }

    .sale-box {
      display: none;
      background: #fff3f3;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #ffc9c9;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<section layout:fragment="content" class="container mt-5 mb-5">

  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">

      <div class="card-form">

        <h1>➕ Add New Product</h1>

        <form th:action="@{/products/add}"
              th:object="${product}"
              method="post"
              enctype="multipart/form-data">

          <!-- NAME -->
          <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text"
                   th:field="*{name}"
                   class="form-control"
                   placeholder="Enter product name">
          </div>

          <!-- PRICE -->
          <div class="mb-3">
            <label class="form-label">Price (Giá bán)</label>
            <input type="number"
                   th:field="*{price}"
                   class="form-control"
                   placeholder="Enter selling price">
          </div>

          <!-- SALE CHECKBOX -->
          <div class="form-check form-switch mb-3">
            <!-- ❌ BỎ id vì th:field sẽ tự sinh id -->
            <input class="form-check-input"
                   type="checkbox"
                   th:field="*{sale}">
            <label class="form-check-label fw-bold">
              Sản phẩm Sale 🔥
            </label>
          </div>

          <!-- SALE PRICE BOX -->
          <div id="saleFields" class="sale-box">

            <div class="mb-3">
              <label class="form-label">Giá gốc</label>
              <input type="number"
                     th:field="*{originalPrice}"
                     class="form-control"
                     placeholder="Nhập giá gốc">
            </div>

            <div class="mb-3">
              <label class="form-label">Giá hiện tại (Sale price)</label>
              <input type="number"
                     th:field="*{salePrice}"
                     class="form-control"
                     placeholder="Nhập giá giảm">
            </div>

          </div>

          <!-- CATEGORY -->
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select th:field="*{category}" class="form-select">
              <option value="">-- Select Category --</option>
              <option th:each="category : ${categories}"
                      th:value="${category.id}"
                      th:text="${category.name}">
              </option>
            </select>
          </div>

          <!-- IMAGE -->
          <div class="mb-3">
            <label class="form-label">Product Image</label>
            <input type="file"
                   name="imageFile"
                   class="form-control"
                   accept="image/*">
          </div>

          <!-- DESCRIPTION -->
          <div class="mb-4">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}"
                      class="form-control"
                      rows="4"></textarea>
          </div>

          <!-- BUTTON -->
          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-warning">
              💾 Save Product
            </button>
            <a th:href="@{/products}" class="btn btn-secondary">
              ❌ Cancel
            </a>
          </div>

        </form>

      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      // Lấy checkbox đúng cách (không dùng id nữa)
      const checkbox = document.querySelector("input[name='sale']");
      const saleFields = document.getElementById("saleFields");

      function toggleSaleFields() {
        if (checkbox.checked) {
          saleFields.style.display = "block";
        } else {
          saleFields.style.display = "none";
        }
      }

      // chạy khi load
      toggleSaleFields();

      // chạy khi click
      checkbox.addEventListener("change", toggleSaleFields);

    });
  </script>

</section>



</body>
</html>
